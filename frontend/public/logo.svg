<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Générateur de CR">

  <!-- Fond cercle indigo -->
  <circle cx="50" cy="50" r="48" fill="#4F46E5"/>

  <!-- Document principal -->
  <rect x="24" y="18" width="40" height="52" rx="4" fill="white"/>

  <!-- Coin plié haut-droite -->
  <path d="M54 18 L64 28 H54 Z" fill="#C7D2FE"/>
  <path d="M54 18 L64 28 L64 28 L54 28 Z" fill="#E0E7FF"/>

  <!-- Ligne de titre -->
  <rect x="30" y="35" width="22" height="3.5" rx="1.75" fill="#4F46E5" opacity="0.85"/>

  <!-- Séparateur -->
  <rect x="30" y="42" width="28" height="1" rx="0.5" fill="#E0E7FF"/>

  <!-- Bullet 1 -->
  <circle cx="33" cy="50" r="2" fill="#4F46E5" opacity="0.5"/>
  <rect x="38" y="48.5" width="16" height="3" rx="1.5" fill="#4F46E5" opacity="0.3"/>

  <!-- Bullet 2 -->
  <circle cx="33" cy="58" r="2" fill="#4F46E5" opacity="0.5"/>
  <rect x="38" y="56.5" width="20" height="3" rx="1.5" fill="#4F46E5" opacity="0.3"/>

  <!-- Bullet 3 -->
  <circle cx="33" cy="66" r="2" fill="#4F46E5" opacity="0.5"/>
  <rect x="38" y="64.5" width="13" height="3" rx="1.5" fill="#4F46E5" opacity="0.3"/>

  <!-- Étoile IA (subtile, coin bas-droit) -->
  <g transform="translate(68, 68)">
    <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z"
          fill="white" opacity="0.85"/>
  </g>

</svg>
